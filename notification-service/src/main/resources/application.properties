spring.application.name=notification-service
server.port=8083

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.github.senaustundev.order_service.event.OrderPlacedEvent:com.github.senaustundev.notification_service.event.OrderPlacedEvent

# Mail Configuration (Mailtrap Sandbox)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=5fc33710d69e7e
spring.mail.password=5b2086f7f70850

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Loki Logging
app.loki.url=http://localhost:3100/loki/api/v1/push

# Actuator & Prometheus Metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=${spring.application.name}

# Tracing (Tempo/OTLP)
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
